<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promontoire de Résonance • Sphère 9D active (45000 pts)</title>
    <style>
        :root {
            --bg-space: #030712;
            --neon-blue: #60a5fa;
            --neon-gold: #fbbf24;
            --panel-bg: rgba(10, 15, 30, 0.85);
            --border-color: rgba(96, 165, 250, 0.4);
        }
        body { 
            margin: 0; 
            background: var(--bg-space); 
            overflow: hidden; 
            color: #e0e7ff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            user-select: none;
        }
        #ui { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            z-index: 10; 
            width: 350px; 
            background: var(--panel-bg); 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(96, 165, 250, 0.1);
            pointer-events: auto; 
            transition: border-color 0.3s ease;
        }
        #ui:hover {
            border-color: rgba(96, 165, 250, 0.8);
        }
        h1 { 
            margin: 0 0 5px 0; 
            font-weight: 300; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--neon-blue); 
            font-size: 1.2rem; 
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.3);
        }
        .data { 
            font-size: 0.8rem; 
            opacity: 0.8; 
            margin-bottom: 20px; 
            font-family: monospace;
            color: #94a3b8;
        }
        .gemini-controls { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        button { 
            background: rgba(30, 41, 59, 0.6); 
            border: 1px solid var(--neon-blue); 
            color: #e0e7ff; 
            padding: 12px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 0.85rem; 
            text-align: left; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { 
            background: var(--neon-blue); 
            color: var(--bg-space); 
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
            font-weight: bold;
        }
        #output { 
            margin-top: 20px; 
            font-size: 0.85rem; 
            color: var(--neon-gold); 
            line-height: 1.5;
            min-height: 60px; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 3px solid var(--neon-gold);
            max-height: 250px;
            overflow-y: auto;
        }
        #instructions {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 0.8rem;
            color: rgba(148, 163, 184, 0.7);
            background: rgba(10, 15, 30, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui">
    <h1>Galibier • Sphère 9D</h1>
    <div class="data">Fréquence : 532Hz • État : Sphère de Résonance (45k pts)</div>
    <div class="gemini-controls">
        <button onclick="askGemini('interprète la fréquence 532Hz comme une note de sérénité pour un réserviste')">✨ Interpréter la Fréquence (IA)</button>
        <button onclick="askGemini('rédige une courte maxime sur l\'engagement de service, le courage et la nature alpine')">✨ Maxime d\'Engagement (IA)</button>
    </div>
    <div id="output">Sphère d'énergie stabilisée. Prêt pour la résonance IA.</div>
</div>

<div id="instructions">🖱️ Glissez votre souris ou touchez pour faire pivoter la sphère sous tous ses angles</div>

<script>
    // --- STREAMING_CHUNK: Initialisation de la scène Three.js ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030712, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 28;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- STREAMING_CHUNK: Création du nuage sphérique de 45 000 points ---
    const geometry = new THREE.BufferGeometry();
    const count = 45000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count * 3; i += 3) {
        // Distribution sphérique homogène (Coordonnées sphériques)
        const u = Math.random();
        const v = Math.random();
        const theta = u * 2.0 * Math.PI;
        const phi = Math.acos(2.0 * v - 1.0);
        
        // Rayonnement en pelure d'oignon pour une densité riche
        const baseRadius = 11;
        const thickness = 2.5;
        const r = baseRadius + (Math.random() - 0.5) * thickness;

        positions[i] = r * Math.sin(phi) * Math.cos(theta);
        positions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i + 2] = r * Math.cos(phi);

        // Coloration en dégradé de température alpine (Bleu pur, cyan, or sur les pôles)
        const intensity = (positions[i + 1] + baseRadius) / (baseRadius * 2); // Selon hauteur Y
        colors[i] = 0.35 + intensity * 0.25;      // Rouge
        colors[i + 1] = 0.6 + (1 - intensity) * 0.2; // Vert
        colors[i + 2] = 0.95 + intensity * 0.05;   // Bleu
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ 
        size: 0.075, 
        vertexColors: true, 
        transparent: true, 
        opacity: 0.75, 
        blending: THREE.AddBlending 
    });
    
    const pointsObject = new THREE.Points(geometry, material);
    scene.add(pointsObject);

    // --- STREAMING_CHUNK: Création de la sphère centrale holographique ---
    const sphereGeometry = new THREE.SphereGeometry(6, 48, 48);
    const sphereMaterial = new THREE.MeshBasicMaterial({
        color: 0x60a5fa,
        wireframe: true,
        transparent: true,
        opacity: 0.25,
        blending: THREE.AddBlending
    });
    const coreSphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(coreSphere);

    // --- STREAMING_CHUNK: Gestion des interactions souris et rotation ---
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    const rotationGroup = new THREE.Group();
    
    // On regroupe les objets pour les faire pivoter ensemble
    rotationGroup.add(pointsObject);
    rotationGroup.add(coreSphere);
    scene.add(rotationGroup);

    window.addEventListener('mousedown', (e) => {
        if (e.target.closest('#ui')) return; // Éviter l'interférence avec l'UI
        isDragging = true;
    });

    window.addEventListener('mousemove', (e) => {
        const deltaMove = {
            x: e.clientX - previousMousePosition.x,
            y: e.clientY - previousMousePosition.y
        };

        if (isDragging) {
            // Rotation sur deux axes basée sur le déplacement de la souris
            rotationGroup.rotation.y += deltaMove.x * 0.005;
            rotationGroup.rotation.x += deltaMove.y * 0.005;
        }

        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', () => { isDragging = false; });
    
    // Support du tactile pour mobiles et tablettes
    window.addEventListener('touchstart', (e) => {
        if (e.target.closest('#ui')) return;
        isDragging = true;
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const deltaMove = {
            x: e.touches[0].clientX - previousMousePosition.x,
            y: e.touches[0].clientY - previousMousePosition.y
        };
        rotationGroup.rotation.y += deltaMove.x * 0.005;
        rotationGroup.rotation.x += deltaMove.y * 0.005;
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });

    window.addEventListener('touchend', () => { isDragging = false; });

    // --- STREAMING_CHUNK: Boucle d'animation et déformation mathématique ---
    let turbulence = 1.0;
    let targetTurbulence = 1.0;
    const basePositions = sphereGeometry.attributes.position.clone(); // Sauvegarde de la géométrie de base

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        // Amortissement de la turbulence pour des transitions fluides
        turbulence += (targetTurbulence - turbulence) * 0.05;

        // Rotation automatique douce en fond
        if (!isDragging) {
            rotationGroup.rotation.y += 0.0015 * turbulence;
            rotationGroup.rotation.z += 0.0003;
        }

        // Déformation harmonique de la sphère centrale (Cymatique en temps réel)
        const positionAttribute = coreSphere.geometry.attributes.position;
        const vertex = new THREE.Vector3();

        for (let i = 0; i < positionAttribute.count; i++) {
            vertex.fromBufferAttribute(basePositions, i);
            
            // Calcul des ondes de surface ondulant avec la turbulence
            const wave = Math.sin(vertex.x * 0.8 + time * 3.0) * 
                         Math.cos(vertex.y * 0.8 + time * 3.0) * 
                         Math.sin(vertex.z * 0.8 + time * 1.5) * 
                         0.45 * turbulence;

            vertex.setLength(6 + wave);
            positionAttribute.setXYZ(i, vertex.x, vertex.y, vertex.z);
        }
        positionAttribute.needsUpdate = true;

        // Micro-pulsations du nuage de points extérieur
        const scale = 1.0 + Math.sin(time * 2.0) * 0.015 * turbulence;
        pointsObject.scale.set(scale, scale, scale);

        renderer.render(scene, camera);
    }
    animate();

    // --- STREAMING_CHUNK: Gestion adaptative de la fenêtre ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- STREAMING_CHUNK: Intégration de l'API Gemini ---
    const apiKey = ""; //Secret_api_key_sry_bro_vibecoeur_lol_=>dev@here

    async function askGemini(prompt) {
        const output = document.getElementById('output');
        output.innerText = "Connexion au fluide IA de la sphère...";
        targetTurbulence = 4.5; // La sphère s'emballe et réagit vibratoirement
        coreSphere.material.color.setHex(0xfbbf24); // Changement de couleur temporaire (or)

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                output.innerText = data.candidates[0].content.parts[0].text;
            } else {
                output.innerText = "Erreur IA : " + (data.error?.message || "La réponse n'a pas pu être canalisée.");
            }
            
            // Retour progressif au calme et à la couleur d'origine (bleu) après réception
            setTimeout(() => { 
                targetTurbulence = 1.0; 
                coreSphere.material.color.setHex(0x60a5fa);
            }, 4000);

        } catch (error) {
            output.innerText = "Interférence réseau : " + error.message;
            targetTurbulence = 1.0;
            coreSphere.material.color.setHex(0x60a5fa);
        }
    }
</script>
</body>
</html>
